# WebApp Switchboard — nginx reverse proxy
# Installed by setup.sh to /etc/nginx/sites-available/switchboard
# Placeholders: {{DOMAIN}} {{DEPLOY_ROOT}}

server {
    listen 80;
    server_name {{DOMAIN}};

    # Allow ACME challenges for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name {{DOMAIN}};

    listen 443 ssl;
    http2 on;
    listen 443 quic reuseport;
    http3 on;

    # Advertise HTTP/3 to browsers
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15768000" always;

    # Block direct access to dotfiles
    location ~ /\. { deny all; }

    # All traffic proxied to Gunicorn
    location / {
        proxy_pass http://unix:/run/switchboard/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 60;
    }
}
